<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Gallery</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f4f4;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.filter-buttons{
    text-align:center;
    margin-bottom:20px;
}

.filter-buttons button{
    padding:10px 20px;
    margin:5px;
    border:none;
    background:#333;
    color:white;
    cursor:pointer;
    border-radius:5px;
}

.filter-buttons button:hover{
    background:#555;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
}

.gallery img{
    width:100%;
    height:220px;
    object-fit:cover;
    border-radius:10px;
    cursor:pointer;
    transition:transform 0.3s ease, box-shadow 0.3s ease;
}

.gallery img:hover{
    transform:scale(1.05);
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.lightbox{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    justify-content:center;
    align-items:center;
    z-index:1000;
}

.lightbox img{
    max-width:80%;
    max-height:80%;
}

.close{
    position:absolute;
    top:20px;
    right:30px;
    font-size:40px;
    color:white;
    cursor:pointer;
}

.prev,
.next{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    font-size:50px;
    color:white;
    cursor:pointer;
    padding:10px;
}

.prev{
    left:20px;
}

.next{
    right:20px;
}
</style>
</head>
<body>

<h1>Image Gallery</h1>

<div class="filter-buttons">
    <button onclick="filterImages('all')">All</button>
    <button onclick="filterImages('nature')">Nature</button>
    <button onclick="filterImages('city')">City</button>
</div>

<div class="gallery">
    <img src="https://picsum.photos/id/1018/600/400" class="nature">
    <img src="https://picsum.photos/id/1015/600/400" class="nature">
    <img src="https://picsum.photos/id/1011/600/400" class="nature">

    <img src="https://picsum.photos/id/1031/600/400" class="city">
    <img src="https://picsum.photos/id/1043/600/400" class="city">
    <img src="https://picsum.photos/id/1060/600/400" class="city">
</div>
<div class="lightbox" id="lightbox">
    <span class="close">&times;</span>
    <span class="prev">&#10094;</span>

    <img id="lightbox-img">

    <span class="next">&#10095;</span>
</div>

<script>
const images = document.querySelectorAll('.gallery img');
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightbox-img');
const closeBtn = document.querySelector('.close');
const prevBtn = document.querySelector('.prev');
const nextBtn = document.querySelector('.next');

let currentIndex = 0;

images.forEach((img,index)=>{
    img.addEventListener('click',()=>{
        currentIndex = index;
        showImage();
        lightbox.style.display = 'flex';
    });
});

function showImage(){
    lightboxImg.src = images[currentIndex].src;
}

nextBtn.addEventListener('click',()=>{
    currentIndex = (currentIndex + 1) % images.length;
    showImage();
});

prevBtn.addEventListener('click',()=>{
    currentIndex = (currentIndex - 1 + images.length) % images.length;
    showImage();
});

closeBtn.addEventListener('click',()=>{
    lightbox.style.display = 'none';
});

lightbox.addEventListener('click',(e)=>{
    if(e.target === lightbox){
        lightbox.style.display = 'none';
    }
});

function filterImages(category){
    images.forEach(img=>{
        if(category === 'all' || img.classList.contains(category)){
            img.style.display = 'block';
        }else{
            img.style.display = 'none';
        }
    });
}
</script>

</body>
</html>
